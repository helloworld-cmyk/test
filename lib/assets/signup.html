<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Đăng ký</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
				Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
		}

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #f3f4f6;
			padding: 16px;
		}

		.signup-card {
			width: 100%;
			max-width: 420px;
			background: #ffffff;
			border-radius: 14px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
			padding: 24px;
		}

		.signup-title {
			font-size: 26px;
			font-weight: 700;
			color: #111827;
			margin-bottom: 6px;
		}

		.signup-subtitle {
			font-size: 14px;
			color: #6b7280;
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 14px;
		}

		.form-label {
			display: block;
			font-size: 14px;
			font-weight: 600;
			color: #374151;
			margin-bottom: 6px;
		}

		.form-input {
			width: 100%;
			border: 1px solid #d1d5db;
			border-radius: 10px;
			padding: 11px 12px;
			font-size: 14px;
			color: #111827;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		.form-input:focus {
			border-color: #4f46e5;
			box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
		}

		.terms {
			display: flex;
			align-items: flex-start;
			gap: 8px;
			margin: 6px 0 16px;
			font-size: 13px;
			color: #4b5563;
		}

		.terms input {
			margin-top: 2px;
		}

		.signup-btn {
			width: 100%;
			border: none;
			border-radius: 10px;
			padding: 12px;
			font-size: 15px;
			font-weight: 700;
			color: #ffffff;
			background: #4f46e5;
			cursor: pointer;
			transition: opacity 0.2s ease;
		}

		.signup-btn:hover {
			opacity: 0.9;
		}

		.login-link {
			margin-top: 14px;
			text-align: center;
			font-size: 14px;
			color: #6b7280;
		}

		.login-link a {
			color: #4f46e5;
			text-decoration: none;
			font-weight: 600;
		}
	</style>
</head>
<body>
	<div class="signup-card">
		<h1 class="signup-title">Tạo tài khoản</h1>
		<p class="signup-subtitle">Điền thông tin để đăng ký tài khoản mới</p>

		<form>
			<div class="form-group">
				<label class="form-label" for="fullName">Họ và tên</label>
				<input class="form-input" id="fullName" type="text" placeholder="Nguyễn Văn A" required />
			</div>

			<div class="form-group">
				<label class="form-label" for="email">Email</label>
				<input class="form-input" id="email" type="email" placeholder="name@example.com" required />
			</div>

			<div class="form-group">
				<label class="form-label" for="password">Mật khẩu</label>
				<input class="form-input" id="password" type="password" placeholder="••••••••" required />
			</div>

			<div class="form-group">
				<label class="form-label" for="confirmPassword">Xác nhận mật khẩu</label>
				<input class="form-input" id="confirmPassword" type="password" placeholder="••••••••" required />
			</div>

			<label class="terms">
				<input type="checkbox" required />
				<span>Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật.</span>
			</label>

			<button class="signup-btn" type="submit">Đăng ký</button>
		</form>

		<p class="login-link">
			Đã có tài khoản? <a href="#">Đăng nhập</a>
		</p>
	</div>
</body>
</html>
